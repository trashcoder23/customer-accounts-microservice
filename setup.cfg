[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-package=service
cover-erase=1
cover-html=1
cover-html-dir=cover
cover-xml=1
cover-xml-file=coverage.xml

[flake8]
max-line-length = 127
exclude = .git,__pycache__,build,dist,venv,tests
ignore = E203, W503

[pylint]
good-names = i,j,k,ex,Run,_,id,app,db
max-line-length = 127
disable = C0114, C0115, C0116, R0903, R0201

[coverage:run]
source = service
omit = tests/*,venv/*,*/__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
